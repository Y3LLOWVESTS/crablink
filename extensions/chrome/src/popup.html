<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Opening CrabLink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- check-token: crab://<hash>.image -->
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1628;
        --panel: #111c31;
        --border: #2c3a54;
        --text: #f7fbff;
        --muted: #a9b6cc;
        --blue: #2f67f2;
        --bad: #fca5a5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 320px;
        min-width: 320px;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--border);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      button {
        min-height: 38px;
        border: 0;
        border-radius: 12px;
        background: var(--blue);
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        padding: 10px 12px;
      }

      #errorText {
        display: none;
        color: var(--bad);
        overflow-wrap: anywhere;
      }

      body.error #errorText {
        display: block;
      }

      body.error #openButton {
        display: block;
      }

      #openButton {
        display: none;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>Opening CrabLink…</h1>
      <p>This popup is only a launcher. The full CrabLink browser will open in a normal tab.</p>
      <p id="errorText"></p>
      <button id="openButton" type="button">Open CrabLink Browser</button>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
