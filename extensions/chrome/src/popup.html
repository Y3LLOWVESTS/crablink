<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Opening CrabLink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- check-token: crab://<hash>.image -->
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #101010;
        --panel-2: #171717;
        --border: #303030;
        --text: #f8f8f8;
        --muted: #b6b6b6;
        --accent: #f2f2f2;
        --accent-text: #111111;
        --secondary: #222222;
        --bad: #fca5a5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 340px;
        min-width: 340px;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--accent);
        color: var(--accent-text);
        font: inherit;
        font-weight: 850;
        cursor: pointer;
        padding: 10px 12px;
      }

      button.secondary {
        background: var(--secondary);
        color: var(--text);
      }

      #errorText {
        display: none;
        color: var(--bad);
        overflow-wrap: anywhere;
      }

      body.error #errorText {
        display: block;
      }

      .hint {
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }
    </style>
  </head>

  <body>
    <main>
      <h1>Opening CrabLink…</h1>
      <p>React is now the primary CrabLink browser lane. The old page lane remains available as a fallback.</p>

      <section class="hint" aria-label="Safety note">
        <p>No wallet action happens from this popup. It only opens an extension-owned browser tab.</p>
      </section>

      <p id="errorText"></p>

      <div class="actions">
        <button id="openButton" type="button">Open React CrabLink</button>
        <button id="legacyButton" class="secondary" type="button">Open Legacy Fallback</button>
      </div>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
